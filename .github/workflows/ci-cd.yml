name: ShapeShred CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true
    
    - name: Debug - Show Environment
      working-directory: frontend/mobile-app/shapeshred
      run: |
        echo "=== Debug Info ==="
        echo "Working directory: $(pwd)"
        echo "Flutter version:"
        flutter --version
        echo "Files in current directory:"
        ls -la
        echo "pubspec.yaml exists: $(test -f pubspec.yaml && echo 'YES' || echo 'NO')"
    
    - name: Get dependencies
      working-directory: frontend/mobile-app/shapeshred
      run: flutter pub get
    
    - name: Analyze
      working-directory: frontend/mobile-app/shapeshred
      run: flutter analyze || echo "Analysis completed with warnings"
      continue-on-error: true
    
    - name: Run tests (optional)
      working-directory: frontend/mobile-app/shapeshred
      run: flutter test || echo "No tests - skipping"
      continue-on-error: true
    
    - name: Build APK Debug
      working-directory: frontend/mobile-app/shapeshred
      run: flutter build apk --debug
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: frontend/mobile-app/shapeshred/build/app/outputs/flutter-apk/app-debug.apk
        retention-days: 30
