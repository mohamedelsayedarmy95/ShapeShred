org.gradle.jvmargs=-Xmx6G -XX:MaxMetaspaceSize=1G -XX:+HeapDumpOnOutOfMemoryError
org.gradle.parallel=true
org.gradle.daemon=true
org.gradle.configureondemand=true
org.gradle.caching=true

# Disable Kotlin incremental compilation
kotlin.incremental=false
kotlin.incremental.java=false

# AndroidX configuration
android.useAndroidX=true
# Jetifier disabled - not needed for modern Flutter projects
android.enableJetifier=false