name: shapeshred
description: "A premium black & white home workout ecosystem."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & UX
  flutter_screenutil: ^5.9.3
  go_router: ^14.2.7
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.0+3
  flutter_native_splash: ^2.4.0
  intl: ^0.20.2

  # State Management & DI
  flutter_bloc: ^8.1.6
  get_it: ^7.7.0
  injectable: ^2.5.0
  equatable: ^2.0.5
  dartz: ^0.10.1

  # Networking & Data
  dio: ^5.5.0+1
  dio_smart_retry: ^7.0.1
  connectivity_plus: ^6.0.3
  shared_preferences: ^2.3.2
  hive_flutter: ^1.1.0
  json_annotation: ^4.9.0
  freezed_annotation: ^3.1.0

  # Firebase
  firebase_core: ^3.12.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.0.0

  # Auth & Social
  google_sign_in: ^6.1.5
  sign_in_with_apple: ^6.0.0
  flutter_facebook_auth: ^6.0.4

  # Utilities
  flutter_dotenv: ^5.2.1
  logger: ^2.7.0
  cupertino_icons: ^1.0.8
  firebase_analytics: ^11.6.0
  firebase_crashlytics: ^4.3.10
  firebase_messaging: ^15.2.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # Code Generation
  build_runner: ^2.4.13
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  injectable_generator: ^2.6.0
  
  # Tools
  flutter_launcher_icons: ^0.13.1
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
  generate: true
  
  assets:
    - assets/images/
    - assets/icons/
    - .env


flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#000000"

flutter_native_splash:
  color: "#000000"
  image: assets/icons/app_icon.png
  android: true
  ios: false

